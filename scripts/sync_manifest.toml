# sync_manifest.toml — canonical-source map for cross-phase module convergence
#
# Policy (adversarial-analysis-v3.md #7, hardened in v4 #3): each shared module
# is canonical in its INTRODUCTION phase. Every later phase listed in
# `applies_to` must carry a byte-identical copy of the introduction-phase file.
# Phases listed in `excluded` intentionally diverge (or do not ship the file) —
# they are never compared and propagate mode refuses to overwrite them without
# --force. `excluded_reason` records WHY, so the intent can be audited.
#
# [[ignore]] entries cover multi-copy paths that are intentionally divergent in
# EVERY phase (nothing to converge at all). The --check-all completeness pass
# fails when a path exists in >= 2 solutions/*/src trees and has neither a
# [[modules]] nor an [[ignore]] entry — new multi-copy files cannot silently
# live outside this gate.
#
# Consumed by scripts/sync_forward.py:
#   uv run python scripts/sync_forward.py --check-all          # audit (CI gate)
#   uv run python scripts/sync_forward.py --base solutions FILE FROM --apply
#
# Paths are relative to a phase directory (solutions/phase_NN/ or
# skeletons/phase_NN/). Phase numbers are integers 0-8.

[manifest]
version = 2
phases = [0, 1, 2, 3, 4, 5, 6, 7, 8]

# ── Phase 0: shared text utilities ───────────────────────────────────────────
# textutil.slugify is the single title→filename rule; it lands in Phase 0
# (create's flagship deliverable) and is byte-identical in every later phase.

[[modules]]
file = "src/akanga_core/textutil.py"
introduced_in = 0
applies_to = [0, 1, 2, 3, 4, 5, 6, 7, 8]

# ── Phase 2 family: persistence + parsing core ────────────────────────────────
# parser.py/models.py also exist in phases 00-01 as smaller pre-introduction
# forms — those layers are out of scope by design (applies_to starts at the
# phase where the full module lands).

[[modules]]
file = "src/akanga_core/db.py"
introduced_in = 2
applies_to = [2, 3, 4, 5, 6, 7, 8]

[[modules]]
file = "src/akanga_core/parser.py"
introduced_in = 2
applies_to = [2, 3, 4, 5, 6, 7, 8]

[[modules]]
file = "src/akanga_core/models.py"
introduced_in = 2
applies_to = [2, 3, 4, 5, 6, 7, 8]

[[modules]]
file = "src/akanga_core/sync_queue.py"
introduced_in = 2
applies_to = [2, 3, 4, 5, 6, 7, 8]

[[modules]]
file = "src/akanga_core/indexer.py"
introduced_in = 2
applies_to = [2, 3, 4, 5, 6, 7, 8]

[[modules]]
file = "src/akanga_core/links.py"
introduced_in = 2
applies_to = [2, 3, 4, 5, 6, 7, 8]

# ── Phase 3: graph traversal ─────────────────────────────────────────────────

[[modules]]
file = "src/akanga_core/graph.py"
introduced_in = 3
applies_to = [3, 4, 5, 6, 7, 8]
excluded = []

# ── Phase 4 family: events + filesystem watching ─────────────────────────────

[[modules]]
file = "src/akanga_core/eventbus.py"
introduced_in = 4
applies_to = [4, 5, 6, 7, 8]
excluded = []

[[modules]]
file = "src/akanga_core/watcher.py"
introduced_in = 4
applies_to = [4, 5, 6, 7, 8]
excluded = []

# phase_08 ships sync_worker.py byte-identical since the Round-3 integration
# pass — the old "phase_08 does not ship sync_worker.py" exclusion reason was
# stale (adversarial-analysis-v4 #3) and is gone.
[[modules]]
file = "src/akanga_core/sync_worker.py"
introduced_in = 4
applies_to = [4, 5, 6, 7, 8]
excluded = []

# ── Phase 5 family: Textual TUI ──────────────────────────────────────────────
# The TUI is the one module that legitimately CHANGES shape every phase:
# phase_05 is the full standalone build, phase_06 ships the minimal-but-complete
# variant used by the cumulative tree, phase_07 adds graph/editor screens.
# These entries exist so the completeness pass governs the paths and propagate
# mode refuses to clobber the divergent copies.

[[modules]]
file = "src/akanga_tui/app.py"
introduced_in = 5
applies_to = [5]
excluded = [6, 7, 8]
excluded_reason = "every later phase's TUI is intentionally divergent: phase_06 ships the minimal-but-complete variant, phase_07 adds graph/editor screens, and phase_08's TUI is the AkangaApp-consumer variant (core: AkangaApp)"

# phase_08 does not ship akanga_tui/__init__.py at all (the capstone drives the
# TUI through akanga_core.app), so 8 appears in neither applies_to nor excluded.
[[modules]]
file = "src/akanga_tui/__init__.py"
introduced_in = 5
applies_to = [5]
excluded = [6, 7]
excluded_reason = "the package docstring is rewritten in each phase to describe that phase's TUI variant — intentionally divergent alongside app.py"

# ── Phase 6: REST API ────────────────────────────────────────────────────────
# akanga_core/server.py converged across 6-8 during the Round-3 integration
# pass; the divergent capstone server is src/akanga_mcp/server.py (single-copy,
# phase_08 only — not a convergence concern). The old `excluded = [8]` was
# stale (adversarial-analysis-v4 #3).

[[modules]]
file = "src/akanga_core/server.py"
introduced_in = 6
applies_to = [6, 7, 8]
excluded = []

# ── Phase 7: git integration ─────────────────────────────────────────────────

[[modules]]
file = "src/akanga_core/gitmgr.py"
introduced_in = 7
applies_to = [7, 8]
excluded = []

# ── Intentionally divergent in EVERY phase ───────────────────────────────────

[[ignore]]
file = "src/akanga_core/__init__.py"
reason = "the package docstring carries a per-phase module roster ('Phase N reference solution' + the modules that exist so far) — it grows with each phase by design and is never converged"
