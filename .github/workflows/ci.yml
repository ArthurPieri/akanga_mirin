name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint + guards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check tests/ skeletons/ scripts/

      # Enforcing since 2026-06-10 (first clean run: 27286025295).
      - name: Doc-contract lint (doc ↔ skeleton signature drift)
        run: uv run python scripts/check_doc_contracts.py

      - name: No gitignored files may be tracked
        run: |
          BAD=$(git ls-files -i -c --exclude-standard)
          if [ -n "$BAD" ]; then
            echo "Tracked files that match .gitignore patterns:"
            echo "$BAD"
            exit 1
          fi

      - name: No binaries or oversized files
        run: |
          BAD=0
          while IFS= read -r f; do
            case "$f" in
              *.pyc|*.pyo|*.db|*.db-wal|*.db-shm|*.sqlite) echo "Forbidden binary tracked: $f"; BAD=1 ;;
            esac
            SIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1048576 ]; then
              echo "File exceeds 1MB: $f ($SIZE bytes)"; BAD=1
            fi
          done < <(git ls-files)
          exit $BAD

      - name: Check skeletons raise NotImplementedError
        run: |
          for dir in skeletons/phase_*/src; do
            if [ -d "$dir" ]; then
              echo "Checking $dir ..."
              uv run python scripts/skeleton_check.py "$dir"
            fi
          done

      - name: Phase completion status
        run: |
          echo ""
          echo "Phase | Skeleton | Tests | Solution"
          echo "------|----------|-------|--------"
          for n in 0 1 2 3 4 5 6 7 8; do
            PHASE_PAD=$(printf "%02d" $n)
            SKEL=$([ -d "skeletons/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            TEST=$([ -d "tests/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            SOLN=$([ -d "solutions/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            echo "${PHASE_PAD}    | ${SKEL}      | ${TEST}   | ${SOLN}"
          done

  # The real integrity property: solution N must pass the CUMULATIVE suite
  # 00..N, not just its own phase (adversarial-analysis-v3.md #12). The matrix
  # makes the O(N²) check affordable: 9 parallel legs with a warm uv cache.
  verify:
    name: "Verify solution ${{ matrix.phase }} (cumulative 00..${{ matrix.phase }})"
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        phase: [0, 1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests 00..${{ matrix.phase }} against solutions/phase_0${{ matrix.phase }}
        run: |
          PHASE_PAD=$(printf "%02d" ${{ matrix.phase }})
          SOLUTION_SRC="solutions/phase_${PHASE_PAD}/src"
          if [ ! -d "$SOLUTION_SRC" ]; then
            echo "::error::No reference solution at ${SOLUTION_SRC} — every phase must ship one."
            exit 1
          fi
          FAILED=0
          for m in $(seq 0 ${{ matrix.phase }}); do
            M_PAD=$(printf "%02d" $m)
            if [ -d "tests/phase_${M_PAD}" ]; then
              echo "── tests/phase_${M_PAD} vs ${SOLUTION_SRC} ──"
              AKANGA_SRC="$SOLUTION_SRC" uv run pytest "tests/phase_${M_PAD}/" -q \
                || FAILED=$((FAILED+1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "${FAILED} test phase(s) failed against ${SOLUTION_SRC}."
            exit 1
          fi
          echo "Solution phase_${PHASE_PAD} is cumulative — all prior suites pass."

  # Convergence gate (v3 #7): every should-be-identical cross-phase module copy
  # must be byte-identical to its introduction-phase canonical, as declared in
  # scripts/sync_manifest.toml. Runs after the solutions tests so a red gate
  # always means drift, never a broken tree.
  drift-gate:
    name: Solution-tree convergence gate
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Cross-phase drift check (scripts/sync_manifest.toml)
        run: uv run python scripts/sync_forward.py --check-all
