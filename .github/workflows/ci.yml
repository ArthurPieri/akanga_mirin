name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint + guards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check tests/ skeletons/ scripts/

      # The phase roster lives in one place (Makefile MAX_PHASE); this file's
      # verify matrix below cannot read Make variables, so it hard-codes the
      # list. This guard fails the build the day the two disagree
      # (adversarial-analysis-v5 #5).
      - name: Phase roster consistency (Makefile MAX_PHASE vs verify matrix)
        run: |
          MAKE_MAX=$(make -s print-max-phase)
          MATRIX_MAX=$(grep -E '^\s+phase: \[' .github/workflows/ci.yml \
            | tr -dc '0-9\n,' | tr ',' '\n' | sort -n | tail -1)
          if [ "$MAKE_MAX" != "$MATRIX_MAX" ]; then
            echo "Makefile MAX_PHASE=$MAKE_MAX but ci.yml verify matrix tops out at $MATRIX_MAX."
            echo "Update the 'phase:' matrix in ci.yml to cover 0..$MAKE_MAX."
            exit 1
          fi

      # Enforcing since 2026-06-10 (first clean run: 27286025295).
      - name: Doc-contract lint (doc ↔ skeleton signature drift)
        run: uv run python scripts/check_doc_contracts.py

      # Welds the marker-file prose to scripts/_common.MARKER_SNIPPETS and to
      # check_doc_contracts' AST-empty heuristic (adversarial-analysis-v5 #4).
      # Needs no AKANGA_SRC — it imports no learner code.
      - name: Marker-convention pinning test
        run: uv run pytest tests/test_scripts_markers.py -q

      - name: No gitignored files may be tracked
        run: |
          BAD=$(git ls-files -i -c --exclude-standard)
          if [ -n "$BAD" ]; then
            echo "Tracked files that match .gitignore patterns:"
            echo "$BAD"
            exit 1
          fi

      - name: No binaries or oversized files
        run: |
          BAD=0
          while IFS= read -r f; do
            case "$f" in
              *.pyc|*.pyo|*.db|*.db-wal|*.db-shm|*.sqlite) echo "Forbidden binary tracked: $f"; BAD=1 ;;
            esac
            SIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1048576 ]; then
              echo "File exceeds 1MB: $f ($SIZE bytes)"; BAD=1
            fi
          done < <(git ls-files)
          exit $BAD

      - name: Check skeletons raise NotImplementedError
        run: |
          for dir in skeletons/phase_*/src; do
            if [ -d "$dir" ]; then
              echo "Checking $dir ..."
              uv run python scripts/skeleton_check.py "$dir"
            fi
          done

      - name: Phase completion status
        run: |
          echo ""
          echo "Phase | Skeleton | Tests | Solution"
          echo "------|----------|-------|--------"
          # Roster derived from the Makefile single source (adversarial-analysis-v5 #5)
          for n in $(seq 0 "$(make -s print-max-phase)"); do
            PHASE_PAD=$(printf "%02d" $n)
            SKEL=$([ -d "skeletons/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            TEST=$([ -d "tests/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            SOLN=$([ -d "solutions/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            echo "${PHASE_PAD}    | ${SKEL}      | ${TEST}   | ${SOLN}"
          done

  # The state every real learner occupies — completed work for N-1 (modeled by
  # the N-1 solution) + `make skeleton PHASE=N` merged on top — verified by nobody
  # (adversarial-analysis-v4.md #4): CI tested pristine skeletons and pristine
  # solutions, never the merged product. This job walks every transition
  # N-1 → N, exercises the AST merge, and asserts the merged tree is a sane
  # STARTING state: pytest collection must succeed (exit != 2) and the short
  # tracebacks may contain NotImplementedError (stubs are unimplemented — that
  # is the expected red), but never ImportError/AttributeError/NameError.
  transition:
    name: Merged-skeleton transitions (N-1 → N)
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Walk every skeleton transition N-1 → N
        run: |
          FAILED=0
          # Roster derived from the Makefile single source (adversarial-analysis-v5 #5)
          for N in $(seq 1 "$(make -s print-max-phase)"); do
            PREV_PAD=$(printf "%02d" $((N - 1)))
            N_PAD=$(printf "%02d" "$N")
            echo ""
            echo "── Transition ${PREV_PAD} → ${N_PAD} ──"
            rm -rf src
            # Base = the prior SOLUTION, not the prior skeleton: a real learner at
            # this transition has IMPLEMENTED phases 0..N-1 (skeleton marker files
            # contain no code and would fail imports for reasons no learner hits).
            cp -R "solutions/phase_${PREV_PAD}/src" src
            if ! make skeleton PHASE=$N; then
              echo "::error::make skeleton PHASE=$N failed — the merged-skeleton state is broken for transition ${PREV_PAD}→${N_PAD}"
              FAILED=$((FAILED + 1))
              continue
            fi
            STATUS=0
            AKANGA_SRC=./src uv run pytest "tests/phase_${N_PAD}" -q --tb=line > out.log 2>&1 || STATUS=$?
            cat out.log
            if [ "$STATUS" -eq 2 ]; then
              echo "::error::pytest collection failed (exit 2) — the merged-skeleton state is broken for transition ${PREV_PAD}→${N_PAD}"
              FAILED=$((FAILED + 1))
              continue
            fi
            if grep -E 'ImportError|AttributeError|NameError' out.log; then
              echo "::error::ImportError/AttributeError/NameError in the merged tree — the merged-skeleton state is broken for transition ${PREV_PAD}→${N_PAD} (NotImplementedError is the only acceptable failure for unimplemented stubs)"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo "Transition ${PREV_PAD} → ${N_PAD}: merged skeleton collects cleanly (pytest exit ${STATUS})."
          done
          rm -f out.log
          if [ "$FAILED" -gt 0 ]; then
            echo "${FAILED} transition(s) produce a broken merged-skeleton starting state."
            exit 1
          fi
          echo "All 8 merged-skeleton transitions are sane starting states."

  # The real integrity property: solution N must pass the CUMULATIVE suite
  # 00..N, not just its own phase (adversarial-analysis-v3.md #12). The matrix
  # makes the O(N²) check affordable: 9 parallel legs with a warm uv cache.
  verify:
    name: "Verify solution ${{ matrix.phase }} (cumulative 00..${{ matrix.phase }})"
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        phase: [0, 1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests 00..${{ matrix.phase }} against solutions/phase_0${{ matrix.phase }}
        run: |
          PHASE_PAD=$(printf "%02d" ${{ matrix.phase }})
          SOLUTION_SRC="solutions/phase_${PHASE_PAD}/src"
          if [ ! -d "$SOLUTION_SRC" ]; then
            echo "::error::No reference solution at ${SOLUTION_SRC} — every phase must ship one."
            exit 1
          fi
          FAILED=0
          for m in $(seq 0 ${{ matrix.phase }}); do
            M_PAD=$(printf "%02d" $m)
            if [ -d "tests/phase_${M_PAD}" ]; then
              echo "── tests/phase_${M_PAD} vs ${SOLUTION_SRC} ──"
              AKANGA_SRC="$SOLUTION_SRC" uv run pytest "tests/phase_${M_PAD}/" -q \
                || FAILED=$((FAILED+1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "${FAILED} test phase(s) failed against ${SOLUTION_SRC}."
            exit 1
          fi
          echo "Solution phase_${PHASE_PAD} is cumulative — all prior suites pass."

  # Convergence gate (v3 #7): every should-be-identical cross-phase module copy
  # must be byte-identical to its introduction-phase canonical, as declared in
  # scripts/sync_manifest.toml. Runs after the solutions tests so a red gate
  # always means drift, never a broken tree.
  drift-gate:
    name: Solution-tree convergence gate
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Cross-phase drift check (scripts/sync_manifest.toml)
        run: uv run python scripts/sync_forward.py --check-all
