name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + verify solutions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check tests/ skeletons/ scripts/

      - name: No gitignored files may be tracked
        run: |
          BAD=$(git ls-files -i -c --exclude-standard)
          if [ -n "$BAD" ]; then
            echo "Tracked files that match .gitignore patterns:"
            echo "$BAD"
            exit 1
          fi

      - name: No binaries or oversized files
        run: |
          BAD=0
          while IFS= read -r f; do
            case "$f" in
              *.pyc|*.pyo|*.db|*.db-wal|*.db-shm|*.sqlite) echo "Forbidden binary tracked: $f"; BAD=1 ;;
            esac
            SIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1048576 ]; then
              echo "File exceeds 1MB: $f ($SIZE bytes)"; BAD=1
            fi
          done < <(git ls-files)
          exit $BAD

      - name: Check skeletons raise NotImplementedError
        run: |
          for dir in skeletons/phase_*/src; do
            if [ -d "$dir" ]; then
              echo "Checking $dir ..."
              uv run python scripts/skeleton_check.py "$dir"
            fi
          done

      - name: Run tests against solutions
        run: |
          FAILED=0
          for n in 0 1 2 3 4 5 6 7 8; do
            PHASE_PAD=$(printf "%02d" $n)
            SOLUTION_SRC="solutions/phase_${PHASE_PAD}/src"
            if [ -d "$SOLUTION_SRC" ] && [ -d "tests/phase_${PHASE_PAD}" ]; then
              echo "── Phase ${PHASE_PAD} ──"
              AKANGA_SRC="$SOLUTION_SRC" uv run pytest tests/phase_${PHASE_PAD}/ -v \
                || FAILED=$((FAILED+1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "$FAILED phase(s) failed."
            exit 1
          fi
          echo ""
          echo "NOTE: only phases with a solutions/phase_NN/src directory were tested."
          TESTED=$(ls -d solutions/phase_*/src 2>/dev/null | wc -l)
          echo "Solutions coverage: ${TESTED}/9 phases have a reference solution."

      - name: Phase completion status
        run: |
          echo ""
          echo "Phase | Skeleton | Tests | Solution"
          echo "------|----------|-------|--------"
          for n in 0 1 2 3 4 5 6 7 8; do
            PHASE_PAD=$(printf "%02d" $n)
            SKEL=$([ -d "skeletons/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            TEST=$([ -d "tests/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            SOLN=$([ -d "solutions/phase_${PHASE_PAD}" ] && echo "yes" || echo "-")
            echo "${PHASE_PAD}    | ${SKEL}      | ${TEST}   | ${SOLN}"
          done
