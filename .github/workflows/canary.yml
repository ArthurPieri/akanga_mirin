# Weekly canary — upgrade everything to latest compatible versions and run the
# full suite (adversarial-analysis-v3.md #12). Dependency rot lands here as a
# weekly heads-up issue instead of a cliff event during a workshop. This
# workflow gates nothing; failures only open/refresh a tracking issue.
name: Canary

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  canary:
    name: Upgraded-dependency canary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Upgrade lockfile to latest compatible versions
        run: uv lock --upgrade

      - name: Sync upgraded environment
        run: uv sync --all-extras

      - name: Full suite against upgraded dependencies
        run: make test-all

      - name: Open or refresh the canary-failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE="Canary failure: dependency upgrades break the build"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY="Weekly canary run failed on $(date -u +%Y-%m-%d).

          \`uv lock --upgrade\` + \`make test-all\` no longer pass with the latest
          compatible dependency versions. Triage before the drift reaches learners:
          ${RUN_URL}"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" \
            --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Refreshed existing canary issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY"
            echo "Opened new canary issue"
          fi
